<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock Paper Scissor Game</h1>
    <div class = "choices">
        <div id="rock" class = "choice"><img src="rock2.png" alt=""></div>
        <div id="paper" class = "choice"><img src="paper2.png" alt=""></div>
        <div id="scissor" class = "choice"><img src="scissor2.png" alt=""></div>
    </div>

    <div class = "scores">
        <div class = "yourScore">
            <h3 id="userScore">0</h3>
            <h3>Your Score</h3>
        </div>

        <div class="compScore">
            <h3 id="compScore">0</h3>
            <h3>Computer Score</h3>
        </div>
    </div>    
    <div class = "msg-container">
    <p id="msg">Select Rock, Paper, or Scissors</p>
    </div>

    <div class="btn-container">
        <button class = "btn">Restart</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
